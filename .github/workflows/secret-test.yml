      name: Secret Test

on:
  workflow_dispatch:

jobs:
  test-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Use secret via env
        env:
          MY_SECRET_ENV: ${{ secrets.MY_SECRET }}
        run: |
          echo "Using secret inside app logic"
          echo "Length of secret is ${#MY_SECRET_ENV}"

      - name: Simulate AWS usage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "AWS Access Key is set"
          echo "AWS Secret Key is set"
