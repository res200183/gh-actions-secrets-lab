name: Secret Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Simulate AWS usage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "AWS Access Key length: ${#AWS_ACCESS_KEY_ID}"
          echo "AWS Secret Key length: ${#AWS_SECRET_ACCESS_KEY}"

      - name: Validate AWS credentials (simulation)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "No AWS_ACCESS_KEY_ID"
            exit 1
          fi

          if [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "No AWS_SECRET_ACCESS_KEY"
            exit 1
          fi

          echo "AWS credentials are present"
